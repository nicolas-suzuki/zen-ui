<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen UI</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f0f0f0;
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      h1 {
        margin-bottom: 8px;
      }

      .subtitle {
        color: #57606a;
        margin-bottom: 32px;
      }

      .buttons {
        display: flex;
        gap: 16px;
      }

      a {
        display: block;
        padding: 16px 32px;
        background-color: #0969da;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        transition: background-color 0.15s;
      }

      a:hover {
        background-color: #035fc7;
      }

      a.secondary {
        background-color: #eee;
        color: #333;
      }

      a.secondary:hover {
        background-color: #ddd;
      }
    </style>
  </head>
  <body>
    <h1>Zen UI</h1>
    <p class="subtitle">Development & Testing</p>
    <div class="buttons">
      <a href="demo.html">Demo</a>
      <a href="preview.html" class="secondary">Preview Mode</a>
    </div>
  </body>
</html>
