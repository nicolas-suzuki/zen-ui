<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen UI Demo</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #f0f0f0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      body.dark {
        background-color: #0d1117;
        color: #c9d1d9;
      }

      h1 {
        margin-bottom: 20px;
      }

      .controls {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
      }

      button {
        padding: 8px 16px;
        cursor: pointer;
        background-color: #0969da;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
      }

      button:hover {
        background-color: #035fc7;
      }

      button.secondary {
        background-color: #eee;
        color: #333;
      }

      button.secondary:hover {
        background-color: #ddd;
      }

      select {
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: white;
        cursor: pointer;
      }

      body.dark select {
        background-color: #21262d;
        border-color: #30363d;
        color: #c9d1d9;
      }

      .demo-container {
        width: 100%;
        max-width: 850px;
        margin-bottom: 30px;
      }

      .demo-label {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        font-family: monospace;
      }

      body.dark .demo-label {
        color: #8b949e;
      }

      .config-display {
        border-top: 1px solid #e1e4e8;
        padding: 12px 16px;
        font-family: monospace;
        font-size: 11px;
        color: #57606a;
        white-space: pre;
        overflow-x: auto;
        background: white;
        border-radius: 0 0 12px 12px;
      }

      body.dark .config-display {
        border-top-color: #30363d;
        color: #8b949e;
        background: #161b22;
      }

      /* HA theme variables - mimics what Home Assistant provides */
      :root {
        --ha-card-background: white;
        --ha-card-border-radius: 12px;
        --ha-card-box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        --card-background-color: white;
        --primary-text-color: #24292f;
        --secondary-text-color: #57606a;
      }

      body.dark {
        --ha-card-background: #1c1c1c;
        --ha-card-border-radius: 12px;
        --ha-card-box-shadow: none;
        --card-background-color: #1c1c1c;
        --primary-text-color: #c9d1d9;
        --secondary-text-color: #8b949e;
      }
    </style>
  </head>

  <body>
    <h1>Zen UI Demo</h1>

    <div class="controls">
      <button class="secondary" id="theme-toggle">
        Toggle Dark/Light Mode
      </button>
      <button id="regen-data">Generate Random Data</button>
      <select id="locale-select">
        <option value="en">English</option>
        <option value="nl">Dutch (Nederlands)</option>
        <option value="de">German (Deutsch)</option>
        <option value="fr">French (Français)</option>
        <option value="es">Spanish (Español)</option>
        <option value="ja">Japanese (unsupported)</option>
      </select>
    </div>

    <div class="demo-container">
      <div class="demo-label">Rolling (default)</div>
      <zen-ui id="card-rolling"></zen-ui>
      <div class="config-display" id="config-rolling"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">Calendar Year - 2 years</div>
      <zen-ui id="card-multiyear"></zen-ui>
      <div class="config-display" id="config-multiyear"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">Binary Data (levelCount: 2)</div>
      <zen-ui id="card-binary"></zen-ui>
      <div class="config-display" id="config-binary"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">Custom Theme</div>
      <zen-ui id="card-themed"></zen-ui>
      <div class="config-display" id="config-themed"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">Missing Mode: Transparent (sparse data)</div>
      <zen-ui id="card-missing"></zen-ui>
      <div class="config-display" id="config-missing"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">Range Mode (negative + positive values)</div>
      <zen-ui id="card-negative"></zen-ui>
      <div class="config-display" id="config-negative"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">Diverging Colors (red ↔ neutral ↔ green)</div>
      <zen-ui id="card-diverging"></zen-ui>
      <div class="config-display" id="config-diverging"></div>
    </div>

    <div class="demo-container">
      <div class="demo-label">
        Diverging with Custom Neutral (neutralValue: 50)
      </div>
      <zen-ui id="card-diverging-custom"></zen-ui>
      <div class="config-display" id="config-diverging-custom"></div>
    </div>

    <script type="module">
      import '../plugin/zen-ui.ts'

      const cardRolling = document.getElementById('card-rolling')
      const cardMultiyear = document.getElementById('card-multiyear')
      const cardBinary = document.getElementById('card-binary')
      const cardThemed = document.getElementById('card-themed')
      const cardMissing = document.getElementById('card-missing')
      const cardNegative = document.getElementById('card-negative')
      const cardDiverging = document.getElementById('card-diverging')
      const cardDivergingCustom = document.getElementById(
        'card-diverging-custom',
      )
      const configRolling = document.getElementById('config-rolling')
      const configMultiyear = document.getElementById('config-multiyear')
      const configBinary = document.getElementById('config-binary')
      const configThemed = document.getElementById('config-themed')
      const configMissing = document.getElementById('config-missing')
      const configNegative = document.getElementById('config-negative')
      const configDiverging = document.getElementById('config-diverging')
      const configDivergingCustom = document.getElementById(
        'config-diverging-custom',
      )
      const themeBtn = document.getElementById('theme-toggle')
      const regenBtn = document.getElementById('regen-data')
      const localeSelect = document.getElementById('locale-select')

      // Mock Hass Object
      let mockHass = {
        states: {
          'sensor.activity': {
            state: 'on',
            attributes: {
              data: [],
            },
          },
          'sensor.meditation': {
            state: 'on',
            attributes: {
              data: [],
            },
          },
          'sensor.sparse': {
            state: 'on',
            attributes: {
              data: [],
            },
          },
          'sensor.energy': {
            state: 'on',
            attributes: {
              data: [],
            },
          },
          'sensor.temperature_delta': {
            state: 'on',
            attributes: {
              data: [],
            },
          },
          'sensor.score': {
            state: 'on',
            attributes: {
              data: [],
            },
          },
        },
        locale: {
          language: 'en',
        },
      }

      function generateRandomData() {
        const data = []

        // Generate data for 3 years to support multi-year display
        const today = new Date()
        const start = new Date(today.getFullYear() - 2, 0, 1)
        const end = new Date(today.getFullYear(), 11, 31)

        const itr = new Date(start)
        while (itr <= end) {
          const dateStr = itr.toISOString().split('T')[0]

          // Random count 0-15, weighted towards 0
          let count = 0
          if (Math.random() > 0.4) {
            count = Math.floor(Math.random() * 15)
          }
          if (count > 0) {
            data.push({ date: dateStr, count })
          }
          itr.setDate(itr.getDate() + 1)
        }
        return data
      }

      function generateBinaryData() {
        const data = []
        const today = new Date()
        const start = new Date(
          today.getFullYear() - 1,
          today.getMonth(),
          today.getDate(),
        )
        const end = new Date(today)

        const itr = new Date(start)
        while (itr <= end) {
          const dateStr = itr.toISOString().split('T')[0]
          // Binary: ~75% chance of 1 for denser data
          if (Math.random() > 0.25) {
            data.push({ date: dateStr, count: 1 })
          }
          itr.setDate(itr.getDate() + 1)
        }
        return data
      }

      function generateSparseData() {
        const data = []
        const today = new Date()
        const start = new Date(
          today.getFullYear() - 1,
          today.getMonth(),
          today.getDate(),
        )
        const end = new Date(today)

        const itr = new Date(start)
        while (itr <= end) {
          const dateStr = itr.toISOString().split('T')[0]
          // Very sparse: only ~15% of days have data
          if (Math.random() > 0.85) {
            const count = Math.floor(Math.random() * 10) + 1
            data.push({ date: dateStr, count })
          }
          // Occasionally add explicit zeros (~5%)
          else if (Math.random() > 0.95) {
            data.push({ date: dateStr, count: 0 })
          }
          itr.setDate(itr.getDate() + 1)
        }
        return data
      }

      function generateEnergyData() {
        const data = []
        const today = new Date()
        const start = new Date(
          today.getFullYear() - 1,
          today.getMonth(),
          today.getDate(),
        )
        const end = new Date(today)

        const itr = new Date(start)
        while (itr <= end) {
          const dateStr = itr.toISOString().split('T')[0]
          // Energy balance: mix of positive, negative, and zero
          // Positive = surplus, Negative = deficit
          const rand = Math.random()
          let count
          if (rand > 0.7) {
            count = Math.floor(Math.random() * 20) + 1 // positive
          } else if (rand > 0.4) {
            count = -Math.floor(Math.random() * 15) - 1 // negative
          } else {
            count = 0 // zero
          }
          data.push({ date: dateStr, count })
          itr.setDate(itr.getDate() + 1)
        }
        return data
      }

      function generateTemperatureDeltaData() {
        const data = []
        const today = new Date()
        const start = new Date(
          today.getFullYear() - 1,
          today.getMonth(),
          today.getDate(),
        )
        const end = new Date(today)

        const itr = new Date(start)
        while (itr <= end) {
          const dateStr = itr.toISOString().split('T')[0]
          // Temperature delta: symmetric around 0, range roughly -10 to +10
          // Simulates daily temperature variance from average
          const count = Math.round((Math.random() - 0.5) * 20)
          data.push({ date: dateStr, count })
          itr.setDate(itr.getDate() + 1)
        }
        return data
      }

      function generateScoreData() {
        const data = []
        const today = new Date()
        const start = new Date(
          today.getFullYear() - 1,
          today.getMonth(),
          today.getDate(),
        )
        const end = new Date(today)

        const itr = new Date(start)
        while (itr <= end) {
          const dateStr = itr.toISOString().split('T')[0]
          // Score data: 0-100, centered around 50
          // Simulates daily performance scores
          const count = Math.floor(Math.random() * 100)
          data.push({ date: dateStr, count })
          itr.setDate(itr.getDate() + 1)
        }
        return data
      }

      function updateAllCards() {
        const hass = { ...mockHass }
        cardRolling.hass = hass
        cardMultiyear.hass = hass
        cardBinary.hass = hass
        cardThemed.hass = hass
        cardMissing.hass = hass
        cardNegative.hass = hass
        cardDiverging.hass = hass
        cardDivergingCustom.hass = hass
      }

      // Initial configs
      const rollingConfig = {
        card: 'heatmap',
        entity: 'sensor.activity',
        title: 'Activity',
      }

      const multiyearConfig = {
        card: 'heatmap',
        entity: 'sensor.activity',
        title: 'Activity History',
        range: 'year',
        years: 2,
      }

      const binaryConfig = {
        card: 'heatmap',
        entity: 'sensor.meditation',
        title: 'Meditation Streak',
        levelCount: 2,
        baseColor: '#c6a0f6',
      }

      const themedConfig = {
        card: 'heatmap',
        entity: 'sensor.activity',
        title: 'Sleep Tracker',
        baseColor: '#e91e8c',
        backgroundColor: '#fff5f8',
      }

      const missingConfig = {
        card: 'heatmap',
        entity: 'sensor.sparse',
        title: 'Sparse Data (transparent missing)',
        missingMode: 'transparent',
        baseColor: '#0969da',
      }

      const negativeConfig = {
        card: 'heatmap',
        entity: 'sensor.energy',
        title: 'Energy Balance (range mode)',
        valueMode: 'range',
        baseColor: '#238636',
      }

      const divergingConfig = {
        card: 'heatmap',
        entity: 'sensor.temperature_delta',
        title: 'Temperature Variance',
        negativeColor: '#89b4fa', // Catppuccin Mocha Blue
        positiveColor: '#fab387', // Catppuccin Mocha Peach
      }

      const divergingCustomConfig = {
        card: 'heatmap',
        entity: 'sensor.score',
        title: 'Performance Score',
        negativeColor: '#eba0ac', // Catppuccin Mocha Maroon
        positiveColor: '#94e2d5', // Catppuccin Mocha Teal
        neutralValue: 50,
        levelCount: 7,
      }

      // Convert config to YAML format
      function toYaml(config) {
        let yaml = 'type: custom:zen-ui\n'
        for (const [key, value] of Object.entries(config)) {
          yaml += `${key}: ${value}\n`
        }
        return yaml.trim()
      }

      // Display configs
      configRolling.textContent = toYaml(rollingConfig)
      configMultiyear.textContent = toYaml(multiyearConfig)
      configBinary.textContent = toYaml(binaryConfig)
      configThemed.textContent = toYaml(themedConfig)
      configMissing.textContent = toYaml(missingConfig)
      configNegative.textContent = toYaml(negativeConfig)
      configDiverging.textContent = toYaml(divergingConfig)
      configDivergingCustom.textContent = toYaml(divergingCustomConfig)

      // Initialize configs
      cardRolling.setConfig(rollingConfig)
      cardMultiyear.setConfig(multiyearConfig)
      cardBinary.setConfig(binaryConfig)
      cardThemed.setConfig(themedConfig)
      cardMissing.setConfig(missingConfig)
      cardNegative.setConfig(negativeConfig)
      cardDiverging.setConfig(divergingConfig)
      cardDivergingCustom.setConfig(divergingCustomConfig)

      // Sync mockHass with selector values (browser may restore them on refresh)
      mockHass.locale.language = localeSelect.value

      // Initialize data
      mockHass.states['sensor.activity'].attributes.data = generateRandomData()
      mockHass.states['sensor.meditation'].attributes.data =
        generateBinaryData()
      mockHass.states['sensor.sparse'].attributes.data = generateSparseData()
      mockHass.states['sensor.energy'].attributes.data = generateEnergyData()
      mockHass.states['sensor.temperature_delta'].attributes.data =
        generateTemperatureDeltaData()
      mockHass.states['sensor.score'].attributes.data = generateScoreData()
      updateAllCards()

      // Event Listeners
      regenBtn.addEventListener('click', () => {
        mockHass.states['sensor.activity'].attributes.data =
          generateRandomData()
        mockHass.states['sensor.meditation'].attributes.data =
          generateBinaryData()
        mockHass.states['sensor.sparse'].attributes.data = generateSparseData()
        mockHass.states['sensor.energy'].attributes.data = generateEnergyData()
        mockHass.states['sensor.temperature_delta'].attributes.data =
          generateTemperatureDeltaData()
        mockHass.states['sensor.score'].attributes.data = generateScoreData()
        updateAllCards()
      })

      themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark')
      })

      localeSelect.addEventListener('change', (e) => {
        mockHass.locale.language = e.target.value
        updateAllCards()
      })
    </script>
  </body>
</html>
